<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PSL Daily Challenges</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #0a0e27;
      color: #e0e0e0;
      padding: 20px;
      line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #4da6ff; margin-bottom: 5px; font-size: 1.8em; }
    .header-row {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px; margin-bottom: 15px;
    }
    .header-left { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
    .header-info { color: #888; font-size: 0.85em; }
    .toolbar {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .toolbar button, .toolbar label {
      background: #1a1f3a; border: 1px solid #444; color: #ccc;
      padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8em;
    }
    .toolbar button:hover, .toolbar label:hover { border-color: #4da6ff; color: #fff; }
    .toolbar input[type="file"] { display: none; }

    /* GH button */
    .gh-btn { font-weight: bold; }
    .gh-idle { color: #888; }
    .gh-synced { color: #4caf50; }
    .gh-loading, .gh-saving { color: #ff9800; }
    .gh-error { color: #f44336; }

    /* GH modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal {
      background: #1a1f3a; border: 1px solid #444; border-radius: 8px;
      padding: 25px; max-width: 450px; width: 90%;
    }
    .modal h3 { color: #4da6ff; margin-bottom: 15px; }
    .modal input {
      width: 100%; padding: 8px; background: #0a0e27; border: 1px solid #444;
      color: #e0e0e0; border-radius: 4px; margin-bottom: 10px; font-family: monospace;
    }
    .modal button {
      padding: 6px 14px; border-radius: 4px; cursor: pointer; border: 1px solid #444;
      margin-right: 8px; font-size: 0.9em;
    }
    .modal .btn-primary { background: #4da6ff; color: #000; border-color: #4da6ff; }
    .modal .btn-danger { background: #f44336; color: #fff; border-color: #f44336; }
    .modal .btn-cancel { background: #333; color: #ccc; }
    .modal .gh-info { color: #888; font-size: 0.8em; margin-top: 10px; }

    /* Filters */
    .filters {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center;
    }
    .filters select, .filters input[type="text"] {
      padding: 6px 10px; background: #1a1f3a; border: 1px solid #444;
      color: #e0e0e0; border-radius: 4px; font-size: 0.9em;
    }
    .filters input[type="text"] { flex: 1; min-width: 150px; }
    .filter-count { color: #888; font-size: 0.85em; margin-left: 5px; }

    /* Cards */
    .challenge-card {
      background: #1a1f3a; border: 1px solid #333; border-radius: 8px;
      padding: 15px; margin-bottom: 12px; transition: all 0.2s;
    }
    .challenge-card:hover { border-color: #555; background: #232842; }
    .card-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      cursor: pointer; gap: 10px;
    }
    .card-meta {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px;
    }
    .badge {
      font-size: 0.7em; padding: 2px 6px; border-radius: 3px;
      background: #333; color: #aaa; white-space: nowrap;
    }
    .badge-module { background: #1a3a5c; color: #4da6ff; }
    .badge-week { background: #1a3a2c; color: #4caf50; }
    .badge-topic { background: #3a2a1a; color: #ff9800; }
    .badge-promoted { background: #3a1a3a; color: #e040fb; }
    .card-question {
      color: #e0e0e0; white-space: pre-wrap; font-size: 0.95em;
    }
    .expand-arrow {
      color: #666; font-size: 1.2em; min-width: 20px; text-align: center;
      transition: transform 0.2s;
    }
    .expand-arrow.open { transform: rotate(90deg); }
    .card-body {
      margin-top: 12px; padding-top: 12px; border-top: 1px solid #333;
    }
    .answer-section { margin-bottom: 12px; }
    .answer-label { color: #4caf50; font-weight: bold; font-size: 0.85em; margin-bottom: 4px; }
    .answer-text { white-space: pre-wrap; color: #e0e0e0; }
    .solution-section { margin-bottom: 12px; }
    .solution-label { color: #ff9800; font-weight: bold; font-size: 0.85em; margin-bottom: 4px; }
    .solution-text { white-space: pre-wrap; color: #ccc; font-size: 0.9em; }
    .card-image {
      max-width: 100%; border-radius: 4px; margin-top: 8px;
      background: #fff; padding: 4px;
    }
    .card-actions {
      display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;
    }
    .card-actions button {
      padding: 4px 10px; border-radius: 4px; cursor: pointer;
      border: 1px solid #444; background: #1a1f3a; color: #ccc; font-size: 0.8em;
    }
    .card-actions button:hover { border-color: #4da6ff; color: #fff; }
    .card-actions .btn-promote { border-color: #e040fb; color: #e040fb; }
    .card-actions .btn-promote:hover { background: #3a1a3a; }
    .card-actions .btn-promoted { background: #3a1a3a; color: #e040fb; border-color: #e040fb; cursor: default; }
    .card-actions .btn-delete { border-color: #f44336; color: #f44336; }
    .card-actions .btn-delete:hover { background: #3a1a1a; }
    .card-actions .btn-edit { border-color: #ff9800; color: #ff9800; }
    .card-actions .btn-edit:hover { background: #3a2a1a; }

    /* Add form */
    .add-form {
      background: #1a1f3a; border: 1px solid #333; border-radius: 8px;
      padding: 20px; margin-bottom: 20px;
    }
    .add-form h3 { color: #4da6ff; margin-bottom: 15px; }
    .form-row {
      display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;
    }
    .form-group { display: flex; flex-direction: column; flex: 1; min-width: 120px; }
    .form-group label { font-size: 0.8em; color: #888; margin-bottom: 3px; }
    .form-group input, .form-group textarea, .form-group select {
      padding: 6px 10px; background: #0a0e27; border: 1px solid #444;
      color: #e0e0e0; border-radius: 4px; font-family: inherit; font-size: 0.9em;
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-buttons { display: flex; gap: 8px; margin-top: 10px; }
    .form-buttons button {
      padding: 8px 18px; border-radius: 4px; cursor: pointer; border: none; font-size: 0.9em;
    }
    .btn-add { background: #4da6ff; color: #000; font-weight: bold; }
    .btn-add:hover { background: #66b8ff; }
    .btn-reset { background: #333; color: #ccc; border: 1px solid #444; }

    /* Tabs */
    .tabs {
      display: flex; gap: 2px; margin-bottom: 20px; border-bottom: 2px solid #333;
    }
    .tab {
      padding: 8px 18px; cursor: pointer; border-radius: 4px 4px 0 0;
      background: #111; color: #888; border: 1px solid transparent;
      border-bottom: none; font-size: 0.9em;
    }
    .tab.active { background: #1a1f3a; color: #4da6ff; border-color: #333; }
    .tab:hover { color: #e0e0e0; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 40px; color: #666;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef, useMemo } = React;

  // ── Config ─────────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'fufu-daily-challenges-v1';
  const BACKUP_KEY = 'fufu-daily-challenges-v1-backup';
  const GH_OWNER = 'grrarr';
  const GH_REPO = 'fufu-daily-challenges';
  const GH_DATA_PATH = 'fufu-daily-challenges-data.json';
  const TODAY = new Date().toISOString().slice(0, 10);

  const MODULE_NAMES = [
    'Module 0 - Introduction',
    'Module 1 - Algebra Basics',
    'Module 2 - Geometry Tools',
    'Module 3 - Algebra Tools',
    'Module 4 - Combinatorics Tools',
    'Module 5 - Number Theory Tools',
  ];

  // ── Storage ────────────────────────────────────────────────────────────────
  const storage = {
    get(key) {
      try { return JSON.parse(localStorage.getItem(key)); } catch { return null; }
    },
    set(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
    },
  };

  function loadData() {
    let data = storage.get(STORAGE_KEY);
    if (!data || !Array.isArray(data.challenges)) {
      data = storage.get(BACKUP_KEY);
    }
    if (!data || !Array.isArray(data.challenges)) {
      data = { challenges: [] };
    }
    return data;
  }

  function saveData(data) {
    // Save wipe guard: never overwrite N items with 0
    const existing = storage.get(STORAGE_KEY);
    if (existing && Array.isArray(existing.challenges) && existing.challenges.length > 0 && data.challenges.length === 0) {
      console.warn('Save wipe guard: refusing to overwrite data with empty array');
      return;
    }
    storage.set(STORAGE_KEY, data);
    storage.set(BACKUP_KEY, data);
  }

  // ── GitHub Sync ────────────────────────────────────────────────────────────
  async function ghFetch(token) {
    try {
      const headers = { Accept: 'application/vnd.github.v3+json' };
      if (token) headers.Authorization = `token ${token}`;
      const r = await fetch(
        `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_DATA_PATH}`,
        { headers }
      );
      if (!r.ok) return null;
      const d = await r.json();
      let parsed;
      if (d.content) {
        parsed = JSON.parse(atob(d.content.replace(/\n/g, '')));
      } else if (d.download_url) {
        // File > 1MB: content is null, use download_url instead
        const raw = await fetch(d.download_url);
        parsed = await raw.json();
      } else {
        return null;
      }
      return { data: parsed, sha: d.sha };
    } catch { return null; }
  }

  async function ghWrite(token, data, sha) {
    const content = btoa(unescape(encodeURIComponent(
      JSON.stringify({ version: 1, updated: TODAY, ...data }, null, 2)
    )));
    const r = await fetch(
      `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_DATA_PATH}`,
      {
        method: 'PUT',
        headers: {
          Authorization: `token ${token}`,
          Accept: 'application/vnd.github.v3+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          message: `Update daily challenges ${TODAY}`,
          content,
          ...(sha ? { sha } : {}),
        }),
      }
    );
    if (!r.ok) throw new Error(r.status);
    return (await r.json()).content.sha;
  }

  // ── App ────────────────────────────────────────────────────────────────────
  function App() {
    const [data, setData] = useState(null);
    const [tab, setTab] = useState('browse'); // browse | add
    const [expandedId, setExpandedId] = useState(null);
    const [editId, setEditId] = useState(null);

    // Filters
    const [filterModule, setFilterModule] = useState('all');
    const [filterWeek, setFilterWeek] = useState('all');
    const [filterTopic, setFilterTopic] = useState('all');
    const [searchText, setSearchText] = useState('');
    const [filterPromoted, setFilterPromoted] = useState('all');
    const [filterFufuScore, setFilterFufuScore] = useState('all');

    // GH state
    const ghTokenRef = useRef('');
    const ghShaRef = useRef(null);
    const [ghStatus, setGhStatus] = useState('idle');
    const [ghModal, setGhModal] = useState(false);
    const [ghTokenInput, setGhTokenInput] = useState('');
    const [ghLastSync, setGhLastSync] = useState('');

    // Load
    useEffect(() => {
      const d = loadData();
      setData(d);
      const savedToken = localStorage.getItem('fufu-dc-gh-token');
      if (savedToken) {
        ghTokenRef.current = savedToken;
        syncFromGH(savedToken, d);
      }
    }, []);

    // Auto-save on data change
    useEffect(() => {
      if (data) saveData(data);
    }, [data]);

    async function syncFromGH(token, localData) {
      setGhStatus('loading');
      const result = await ghFetch(token);
      if (result) {
        ghShaRef.current = result.sha;
        // Merge: GH wins for matching IDs, keep local-only
        const ghChallenges = result.data.challenges || [];
        const localChallenges = (localData || data).challenges || [];
        const ghMap = new Map(ghChallenges.map(c => [c.id, c]));
        const localMap = new Map(localChallenges.map(c => [c.id, c]));
        // Start with all GH entries
        const merged = [...ghChallenges];
        // Add local-only entries
        for (const [id, c] of localMap) {
          if (!ghMap.has(id)) merged.push(c);
        }
        const newData = { challenges: merged };
        setData(newData);
        setGhStatus('synced');
        setGhLastSync(new Date().toLocaleTimeString());
      } else {
        setGhStatus('synced');
      }
    }

    async function syncToGH(newData) {
      if (!ghTokenRef.current) return;
      setGhStatus('saving');
      try {
        const sha = await ghWrite(ghTokenRef.current, newData || data, ghShaRef.current);
        ghShaRef.current = sha;
        setGhStatus('synced');
        setGhLastSync(new Date().toLocaleTimeString());
      } catch {
        setGhStatus('error');
      }
    }

    function updateData(newData) {
      setData(newData);
      if (ghTokenRef.current) syncToGH(newData);
    }

    // Derived data
    const challenges = data ? data.challenges : [];
    const topics = useMemo(() => {
      const set = new Set(challenges.map(c => c.topic).filter(Boolean));
      return [...set].sort();
    }, [challenges]);

    const filtered = useMemo(() => {
      return challenges.filter(c => {
        if (filterModule !== 'all' && c.module !== parseInt(filterModule)) return false;
        if (filterWeek !== 'all' && c.week !== parseInt(filterWeek)) return false;
        if (filterTopic !== 'all' && c.topic !== filterTopic) return false;
        if (filterPromoted === 'yes' && !c.promoted) return false;
        if (filterPromoted === 'no' && c.promoted) return false;
        if (filterFufuScore === 'wrong' && c.fufuOriginalScore !== '0%') return false;
        if (filterFufuScore === 'right' && c.fufuOriginalScore !== '100%') return false;
        if (searchText) {
          const s = searchText.toLowerCase();
          const hay = `${c.question} ${c.answer} ${c.topic} ${c.solutionSteps}`.toLowerCase();
          if (!hay.includes(s)) return false;
        }
        return true;
      }).sort((a, b) => b.id - a.id);
    }, [challenges, filterModule, filterWeek, filterTopic, filterPromoted, filterFufuScore, searchText]);

    function addChallenge(c) {
      const newData = { challenges: [...challenges, { ...c, id: Date.now() }] };
      updateData(newData);
      setTab('browse');
    }

    function updateChallenge(id, updates) {
      const newData = {
        challenges: challenges.map(c => c.id === id ? { ...c, ...updates } : c)
      };
      updateData(newData);
    }

    function deleteChallenge(id) {
      if (!confirm('Delete this challenge?')) return;
      const newData = { challenges: challenges.filter(c => c.id !== id) };
      updateData(newData);
      if (expandedId === id) setExpandedId(null);
    }

    function exportJSON() {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `fufu-daily-challenges-${TODAY}.json`;
      a.click();
    }

    function importJSON(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          if (imported.challenges && imported.challenges.length > 0) {
            updateData(imported);
          } else {
            alert('Invalid file: no challenges found');
          }
        } catch { alert('Invalid JSON file'); }
      };
      reader.readAsText(file);
      e.target.value = '';
    }

    if (!data) return React.createElement('div', { className: 'container' }, 'Loading...');

    return (
      <div className="container">
        {/* Header */}
        <div className="header-row">
          <div className="header-left">
            <h1>PSL Daily Challenges</h1>
            <span className="header-info">{challenges.length} challenges</span>
            {ghLastSync && <span className="header-info">Synced {ghLastSync}</span>}
          </div>
          <div className="toolbar">
            <button onClick={exportJSON}>Export</button>
            <label>Import<input type="file" accept=".json" onChange={importJSON} /></label>
            <button
              className={`gh-btn gh-${ghStatus}`}
              onClick={() => setGhModal(true)}
            >
              {ghStatus === 'idle' ? 'GH' : ghStatus === 'synced' ? '\u25CF GH' : ghStatus === 'loading' || ghStatus === 'saving' ? '... GH' : '! GH'}
            </button>
          </div>
        </div>

        {/* GH Modal */}
        {ghModal && (
          <div className="modal-overlay" onClick={() => setGhModal(false)}>
            <div className="modal" onClick={e => e.stopPropagation()}>
              <h3>GitHub Sync</h3>
              {ghTokenRef.current ? (
                <div>
                  <p style={{color:'#4caf50', marginBottom: 10}}>Connected</p>
                  <p className="gh-info">Syncs to {GH_REPO}/{GH_DATA_PATH}</p>
                  <div style={{marginTop: 15}}>
                    <button className="btn-danger" onClick={() => {
                      ghTokenRef.current = '';
                      localStorage.removeItem('fufu-dc-gh-token');
                      setGhStatus('idle');
                      setGhLastSync('');
                      setGhModal(false);
                    }}>Disconnect</button>
                    <button className="btn-cancel" onClick={() => setGhModal(false)}>Close</button>
                  </div>
                </div>
              ) : (
                <div>
                  <input
                    type="password"
                    placeholder="GitHub PAT (repo scope)"
                    value={ghTokenInput}
                    onChange={e => setGhTokenInput(e.target.value)}
                  />
                  <div>
                    <button className="btn-primary" onClick={() => {
                      if (!ghTokenInput.trim()) return;
                      ghTokenRef.current = ghTokenInput.trim();
                      localStorage.setItem('fufu-dc-gh-token', ghTokenInput.trim());
                      setGhTokenInput('');
                      setGhModal(false);
                      syncFromGH(ghTokenRef.current, data);
                    }}>Save Token</button>
                    <button className="btn-cancel" onClick={() => setGhModal(false)}>Cancel</button>
                  </div>
                  <p className="gh-info">Create a PAT at github.com/settings/tokens with repo scope</p>
                </div>
              )}
            </div>
          </div>
        )}

        {/* Tabs */}
        <div className="tabs">
          <div className={`tab ${tab === 'browse' ? 'active' : ''}`} onClick={() => { setTab('browse'); setEditId(null); }}>Browse</div>
          <div className={`tab ${tab === 'add' ? 'active' : ''}`} onClick={() => { setTab('add'); setEditId(null); }}>Add Challenge</div>
        </div>

        {tab === 'browse' && (
          <div>
            {/* Filters */}
            <div className="filters">
              <select value={filterModule} onChange={e => setFilterModule(e.target.value)}>
                <option value="all">All Modules</option>
                {MODULE_NAMES.map((name, i) => (
                  <option key={i} value={i}>{name}</option>
                ))}
              </select>
              <select value={filterWeek} onChange={e => setFilterWeek(e.target.value)}>
                <option value="all">All Weeks</option>
                {[1,2,3,4].map(w => <option key={w} value={w}>Week {w}</option>)}
              </select>
              <select value={filterTopic} onChange={e => setFilterTopic(e.target.value)}>
                <option value="all">All Topics</option>
                {topics.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
              <select value={filterPromoted} onChange={e => setFilterPromoted(e.target.value)}>
                <option value="all">All</option>
                <option value="yes">Promoted</option>
                <option value="no">Not Promoted</option>
              </select>
              <select value={filterFufuScore} onChange={e => setFilterFufuScore(e.target.value)}>
                <option value="all">All</option>
                <option value="wrong">Got Wrong (0%)</option>
                <option value="right">Got Right (100%)</option>
              </select>
              <input
                type="text"
                placeholder="Search questions..."
                value={searchText}
                onChange={e => setSearchText(e.target.value)}
              />
              <span className="filter-count">{filtered.length} / {challenges.length}</span>
            </div>

            {/* Cards */}
            {filtered.length === 0 && (
              <div className="empty-state">
                {challenges.length === 0 ? 'No challenges yet. Add one!' : 'No matches for current filters.'}
              </div>
            )}
            {filtered.map(c => (
              <ChallengeCard
                key={c.id}
                challenge={c}
                expanded={expandedId === c.id}
                editing={editId === c.id}
                onToggle={() => setExpandedId(expandedId === c.id ? null : c.id)}
                onPromote={() => updateChallenge(c.id, { promoted: !c.promoted })}
                onDelete={() => deleteChallenge(c.id)}
                onEdit={() => setEditId(editId === c.id ? null : c.id)}
                onSaveEdit={(updates) => { updateChallenge(c.id, updates); setEditId(null); }}
                onCancelEdit={() => setEditId(null)}
              />
            ))}
          </div>
        )}

        {tab === 'add' && (
          <ChallengeForm onSubmit={addChallenge} />
        )}
      </div>
    );
  }

  // ── Challenge Card ─────────────────────────────────────────────────────────
  function ChallengeCard({ challenge: c, expanded, editing, onToggle, onPromote, onDelete, onEdit, onSaveEdit, onCancelEdit }) {
    return (
      <div className="challenge-card">
        <div className="card-header" onClick={onToggle}>
          <div style={{flex: 1}}>
            <div className="card-meta">
              <span className="badge badge-module">M{c.module}</span>
              {c.week && <span className="badge badge-week">W{c.week}</span>}
              {c.day && <span className="badge">D{c.day}</span>}
              {c.topic && <span className="badge badge-topic">{c.topic}</span>}
              {c.promoted && <span className="badge badge-promoted">Promoted</span>}
              {c.fufuOriginalScore === '0%' && <span className="badge badge-promoted">Fufu: 0%</span>}
              <span className="badge">{c.dateAdded}</span>
            </div>
            <div className="card-question">{c.question}</div>
          </div>
          <span className={`expand-arrow ${expanded ? 'open' : ''}`}>&#9654;</span>
        </div>

        {expanded && !editing && (
          <div className="card-body">
            {c.questionImageUrl && (
              <img src={c.questionImageUrl} className="card-image" alt="Question" />
            )}

            <div className="answer-section">
              <div className="answer-label">Answer</div>
              <div className="answer-text">{c.answer}</div>
              {c.answerImageUrl && (
                <img src={c.answerImageUrl} className="card-image" alt="Answer" />
              )}
            </div>

            {c.solutionSteps && (
              <div className="solution-section">
                <div className="solution-label">Solution Steps</div>
                <div className="solution-text">{c.solutionSteps}</div>
              </div>
            )}

            {c.solutionImageUrls && c.solutionImageUrls.length > 0 && (
              <div>
                {c.solutionImageUrls.map((url, i) => (
                  <img key={i} src={url} className="card-image" alt={`Solution step ${i+1}`} />
                ))}
              </div>
            )}

            <div className="card-actions">
              <button className={c.promoted ? 'btn-promoted' : 'btn-promote'} onClick={e => { e.stopPropagation(); onPromote(); }}>
                {c.promoted ? 'Promoted' : 'Promote to SR'}
              </button>
              <button className="btn-edit" onClick={e => { e.stopPropagation(); onEdit(); }}>Edit</button>
              <button className="btn-delete" onClick={e => { e.stopPropagation(); onDelete(); }}>Delete</button>
            </div>
          </div>
        )}

        {expanded && editing && (
          <div className="card-body">
            <EditForm challenge={c} onSave={onSaveEdit} onCancel={onCancelEdit} />
          </div>
        )}
      </div>
    );
  }

  // ── Edit Form ──────────────────────────────────────────────────────────────
  function EditForm({ challenge, onSave, onCancel }) {
    const [form, setForm] = useState({ ...challenge });
    const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

    return (
      <div className="add-form" style={{margin: 0, border: 'none', padding: 0, background: 'transparent'}}>
        <div className="form-row">
          <div className="form-group">
            <label>Module</label>
            <select value={form.module} onChange={e => set('module', parseInt(e.target.value))}>
              {MODULE_NAMES.map((name, i) => <option key={i} value={i}>{name}</option>)}
            </select>
          </div>
          <div className="form-group" style={{maxWidth: 80}}>
            <label>Week</label>
            <input type="number" min="1" max="4" value={form.week || ''} onChange={e => set('week', parseInt(e.target.value) || 0)} />
          </div>
          <div className="form-group" style={{maxWidth: 80}}>
            <label>Day</label>
            <input type="number" min="1" max="10" value={form.day || ''} onChange={e => set('day', parseInt(e.target.value) || 0)} />
          </div>
          <div className="form-group">
            <label>Topic</label>
            <input type="text" value={form.topic || ''} onChange={e => set('topic', e.target.value)} />
          </div>
          <div className="form-group" style={{maxWidth: 140}}>
            <label>Fufu Original Score</label>
            <select value={form.fufuOriginalScore || ''} onChange={e => set('fufuOriginalScore', e.target.value)}>
              <option value="">Unknown</option>
              <option value="100%">100%</option>
              <option value="0%">0%</option>
            </select>
          </div>
        </div>
        <div className="form-group" style={{marginBottom: 10}}>
          <label>Question</label>
          <textarea rows="3" value={form.question || ''} onChange={e => set('question', e.target.value)} />
        </div>
        <div className="form-group" style={{marginBottom: 10}}>
          <label>Question Image URL</label>
          <input type="text" value={form.questionImageUrl || ''} onChange={e => set('questionImageUrl', e.target.value)} />
        </div>
        <div className="form-group" style={{marginBottom: 10}}>
          <label>Answer</label>
          <textarea rows="2" value={form.answer || ''} onChange={e => set('answer', e.target.value)} />
        </div>
        <div className="form-group" style={{marginBottom: 10}}>
          <label>Answer Image URL</label>
          <input type="text" value={form.answerImageUrl || ''} onChange={e => set('answerImageUrl', e.target.value)} />
        </div>
        <div className="form-group" style={{marginBottom: 10}}>
          <label>Solution Steps</label>
          <textarea rows="4" value={form.solutionSteps || ''} onChange={e => set('solutionSteps', e.target.value)} />
        </div>
        <div className="form-group" style={{marginBottom: 10}}>
          <label>Solution Image URLs (one per line)</label>
          <textarea rows="2" value={(form.solutionImageUrls || []).join('\n')} onChange={e => set('solutionImageUrls', e.target.value.split('\n').filter(u => u.trim()))} />
        </div>
        <div className="form-buttons">
          <button className="btn-add" onClick={() => onSave(form)}>Save</button>
          <button className="btn-reset" onClick={onCancel}>Cancel</button>
        </div>
      </div>
    );
  }

  // ── Add Form ───────────────────────────────────────────────────────────────
  function ChallengeForm({ onSubmit }) {
    const empty = {
      module: 0, week: 1, day: 1, topic: '',
      question: '', questionImageUrl: '',
      answer: '', answerImageUrl: '',
      solutionSteps: '', solutionImageUrls: [],
      dateAdded: TODAY, promoted: false, fufuOriginalScore: '',
    };
    const [form, setForm] = useState(empty);
    const set = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

    function handleSubmit() {
      if (!form.question.trim()) { alert('Question is required'); return; }
      onSubmit(form);
      setForm(empty);
    }

    return (
      <div className="add-form">
        <h3>Add Daily Challenge</h3>
        <div className="form-row">
          <div className="form-group">
            <label>Module</label>
            <select value={form.module} onChange={e => set('module', parseInt(e.target.value))}>
              {MODULE_NAMES.map((name, i) => <option key={i} value={i}>{name}</option>)}
            </select>
          </div>
          <div className="form-group" style={{maxWidth: 80}}>
            <label>Week</label>
            <input type="number" min="1" max="4" value={form.week} onChange={e => set('week', parseInt(e.target.value) || 1)} />
          </div>
          <div className="form-group" style={{maxWidth: 80}}>
            <label>Day</label>
            <input type="number" min="1" max="10" value={form.day} onChange={e => set('day', parseInt(e.target.value) || 1)} />
          </div>
          <div className="form-group">
            <label>Topic</label>
            <input type="text" placeholder="e.g. Fractions" value={form.topic} onChange={e => set('topic', e.target.value)} />
          </div>
          <div className="form-group" style={{maxWidth: 140}}>
            <label>Fufu Original Score</label>
            <select value={form.fufuOriginalScore || ''} onChange={e => set('fufuOriginalScore', e.target.value)}>
              <option value="">Unknown</option>
              <option value="100%">100%</option>
              <option value="0%">0%</option>
            </select>
          </div>
        </div>

        <div className="form-group" style={{marginBottom: 10}}>
          <label>Question</label>
          <textarea rows="4" placeholder="Paste the challenge question here..." value={form.question} onChange={e => set('question', e.target.value)} />
        </div>
        <div className="form-group" style={{marginBottom: 10}}>
          <label>Question Image URL</label>
          <input type="text" placeholder="https://..." value={form.questionImageUrl} onChange={e => set('questionImageUrl', e.target.value)} />
        </div>

        <div className="form-group" style={{marginBottom: 10}}>
          <label>Answer</label>
          <textarea rows="2" placeholder="The answer" value={form.answer} onChange={e => set('answer', e.target.value)} />
        </div>
        <div className="form-group" style={{marginBottom: 10}}>
          <label>Answer Image URL</label>
          <input type="text" placeholder="https://..." value={form.answerImageUrl} onChange={e => set('answerImageUrl', e.target.value)} />
        </div>

        <div className="form-group" style={{marginBottom: 10}}>
          <label>Solution Steps</label>
          <textarea rows="5" placeholder="Step 1: ...&#10;Step 2: ..." value={form.solutionSteps} onChange={e => set('solutionSteps', e.target.value)} />
        </div>
        <div className="form-group" style={{marginBottom: 10}}>
          <label>Solution Image URLs (one per line)</label>
          <textarea rows="2" placeholder="https://...&#10;https://..." value={(form.solutionImageUrls || []).join('\n')} onChange={e => set('solutionImageUrls', e.target.value.split('\n').filter(u => u.trim()))} />
        </div>

        <div className="form-row">
          <div className="form-group" style={{maxWidth: 160}}>
            <label>Date Added</label>
            <input type="date" value={form.dateAdded} onChange={e => set('dateAdded', e.target.value)} />
          </div>
        </div>

        <div className="form-buttons">
          <button className="btn-add" onClick={handleSubmit}>Add Challenge</button>
          <button className="btn-reset" onClick={() => setForm(empty)}>Reset</button>
        </div>
      </div>
    );
  }

  // ── Mount ──────────────────────────────────────────────────────────────────
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
